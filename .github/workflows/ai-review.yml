name: AI Code Review

on:
  push:
    branches: ['**']

jobs:
  test-and-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # потрібна повна історія для git diff від першого коміту

      - name: Check repository bootstrap state
        id: bootstrap_guard
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COMMIT_COUNT" -le 1 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skip AI review: repository still at template bootstrap state (<=1 commit)."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.bootstrap_guard.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.bootstrap_guard.outputs.should_run == 'true'
        run: npm install

      - name: Run tests
        if: steps.bootstrap_guard.outputs.should_run == 'true'
        id: run_tests
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run AI Review
        if: steps.bootstrap_guard.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          TEST_OUTPUT_FILE: test-output.txt
        run: node scripts/ai-review.mjs
